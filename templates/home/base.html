<!DOCTYPE html>
{% load static %}
<html>
    <head>
        <title>Home Hub</title>
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1" />

        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">

	    <link rel="stylesheet" type="text/css" href="{% static 'css/base.css' %}">
              
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <a class="navbar-brand" href="{% url "home" %}">Home Hub</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
              <span class="navbar-toggler-icon">                            
                <img  src="{% static 'images/homeicon.png' %}">
              </span>
            </button>
          
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
              <ul class="navbar-nav mr-auto">
                <li class="nav-item active">
                  <a class="nav-link" href="{% url "home" %}">
                    <img id="mini-icon" src="{% static 'images/homeicon.png' %}">
                    Home
                    <span class="sr-only">(current)</span>
                  </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">
                      <img id="mini-icon" src="{% static 'images/aboutusicon.png' %}">
                      About us
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">
                      <img id="mini-icon" src="{% static 'images/contactusicon.png' %}">
                      Contact us
                    </a>
                </li>
              </ul>
                
              <ul class="form-inline my-2 my-lg-0 btn navbar-nav">
                {% if user.is_authenticated %}    
                <li class="dropdown nav-item">
                        <button class="btn btn-default dropdown-toggle" type="button" data-toggle="dropdown" >
                            <img  id="cart-icon" src="{% static 'images/Download_User_Profile_Icon_for_free-removebg-preview.png' %}">
                            <span class="caret"></span>
                        </button>
                        
                        <div class="dropdown-menu ">
                          <a href="#" class="dropdown-item">
                            <img  id="mini-icon" src="{% static 'images/profile2.png' %}">
                            Profile
                          </a>
                          <a href="#" class="dropdown-item">
                            <img  id="mini-icon" src="{% static 'images/Heart_With_Love_Clipart_Hd_PNG__Love_Heart_Icon_Design_Template_Vector_Isolated__Heart_Icons__Love_Icons__Template_Icons_PNG_Image_For_Free_Download-removebg-preview.png' %}">
                            Favourite
                          </a>
                          <a href="#" class="dropdown-item">
                            <img  id="mini-icon" src="{% static 'images/Settings_Logo_iOS_Shortcut_Image-removebg-preview.png' %}">
                            Settings
                          </a>
                          <div class="dropdown-divider"></div>
                          <a href="{% url "logout" %}" class="dropdown-item">
                            <img  id="mini-icon" src="{% static 'images/Icon_Box_Clipart_Vector__Box_Logout_Icon_Vectors__Box_Icons__Logout_Icons__Login_PNG_Image_For_Free_Download-removebg-preview.png' %}">
                            Logout
                          </a>
                          </form>
                      </div>
                    </li>
                    {% endif %}
                    <li class="nav-item">
                      <a class="nav-link" href="{% url 'login' %}">Login</a>
                    </li>
                    <li>\</li>
                    <li class="nav-item">
                      <a class="nav-link" href="{% url "signup" %}">Register</a>
                    </li>
                  </ul>
                
            </div>
          </nav>
        <div class="container">
            <br>
            {% block content %}


            {% endblock content %}
        </div>
        <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>

        <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
    
        <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    </body>
</html>
